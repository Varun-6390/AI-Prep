<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#grad)" />
  <!-- AI sparkle icon -->
  <g transform="translate(256,256)">
    <!-- Center diamond -->
    <path d="M0 -120 L30 0 L0 120 L-30 0 Z" fill="white" opacity="0.95"/>
    <!-- Right arm -->
    <path d="M120 0 L0 30 L-120 0 L0 -30 Z" fill="white" opacity="0.95"/>
    <!-- Top-right sparkle -->
    <path d="M80 -80 L95 -55 L80 -30 L65 -55 Z" fill="white" opacity="0.7"/>
    <!-- Bottom-left sparkle -->
    <path d="M-80 80 L-65 55 L-80 30 L-95 55 Z" fill="white" opacity="0.7"/>
    <!-- Small dot accents -->
    <circle cx="60" cy="-100" r="8" fill="white" opacity="0.5"/>
    <circle cx="-60" cy="100" r="8" fill="white" opacity="0.5"/>
    <circle cx="100" cy="60" r="6" fill="white" opacity="0.4"/>
  </g>
</svg>